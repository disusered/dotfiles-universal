linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi podman &>/dev/null; then
        sudo pacman -S --noconfirm --needed podman podman-desktop podman-compose netavark aardvark-dns
        systemctl --user enable --now podman.socket
      fi
  links:
    registries.conf: ~/.config/containers/registries.conf
    podman.zsh: ~/.config/zsh/0700_podman.zsh
    docker.sh: ~/.local/bin/docker
    storage.conf: ~/.config/containers/storage.conf
