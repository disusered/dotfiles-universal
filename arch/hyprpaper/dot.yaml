linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi hyprpaper &>/dev/null; then
        sudo pacman -S --noconfirm --needed \
          ninja gcc libjpeg-turbo libwebp libjxl pango cairo \
          pkgconf cmake libglvnd hyprpaper
        systemctl --user enable --now hyprpaper.service
      fi
      # hyprpaper.conf is now generated at runtime by cfg wallpaper --apply.
      # Remove stale symlink from previous rotz deployments.
      if [ -L ~/.config/hypr/hyprpaper.conf ]; then
        rm ~/.config/hypr/hyprpaper.conf
      fi
    depends:
      - /arch/hyprland
