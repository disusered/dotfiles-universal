# PS4/PS5 controller support for Steam, gamescope, and emulators.
#
# Per ArchWiki Gamepad (https://wiki.archlinux.org/title/Gamepad):
#   - game-devices-udev covers Sony VIDs beyond Valve's steam-devices rules.
#   - Bluez default ClassicBondedOnly=true rejects the DS4 HID profile
#     connection as !bonded, because the DS4 does "Just Works" BT pairing
#     without leaving the long-term bond bluez expects. Setting it to false
#     lets bluez's UHID path accept the connection; the kernel
#     hid_playstation driver then binds and creates /dev/input/event*
#     (gamepad, motion sensors, touchpad) and /dev/input/js0.
#
# After install, enable "PlayStation Controller Support" in Steam:
#   Settings > Controller > PlayStation Controller Support.

linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi game-devices-udev &>/dev/null; then
        yay -S --noconfirm --needed game-devices-udev
      fi

      if ! grep -qE '^ClassicBondedOnly=false' /etc/bluetooth/input.conf; then
        if grep -qE '^#?ClassicBondedOnly=' /etc/bluetooth/input.conf; then
          sudo sed -i 's/^#\?ClassicBondedOnly=.*/ClassicBondedOnly=false/' /etc/bluetooth/input.conf
        else
          echo 'ClassicBondedOnly=false' | sudo tee -a /etc/bluetooth/input.conf >/dev/null
        fi
        sudo systemctl restart bluetooth.service
      fi

      sudo udevadm control --reload
      sudo udevadm trigger
    depends:
      - /tools/bluez
      - /tools/yay
