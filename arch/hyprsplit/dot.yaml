linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! hyprpm list 2>/dev/null | grep -q hyprsplit; then
        hyprpm update
        hyprpm add https://github.com/shezdy/hyprsplit
        hyprpm enable hyprsplit
      fi
    depends:
      - /arch/hyprland
  links:
    hyprsplit.conf: ~/.config/hypr/conf.d/hyprsplit.conf
