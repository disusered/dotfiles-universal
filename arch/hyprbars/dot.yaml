linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! hyprpm list 2>/dev/null | grep -q hyprbars; then
        hyprpm update
        hyprpm add https://github.com/hyprwm/hyprland-plugins
        hyprpm enable hyprbars
      fi
    # depends:
    #   - /arch/hyprland
  links:
    hyprbars.conf: ~/.config/hypr/conf.d/hyprbars.conf
