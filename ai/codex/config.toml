personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
commit_attribution = ""

[features]
codex_git_commit = false
memories = true

[shell_environment_policy]
inherit = "core"

[tui]
notifications = ["agent-turn-complete", "approval-requested"]
notification_method = "osc9"
notification_condition = "unfocused"
status_line = ["model-with-reasoning", "current-dir", "git-branch", "branch-changes", "run-state", "context-used", "five-hour-limit", "used-tokens", "task-progress"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[projects."/home/carlos/.dotfiles"]
trust_level = "trusted"

[projects."/home/carlos/Development/XBOL"]
trust_level = "trusted"

[projects."/home/carlos/Development/XBOL/xbol-api-admin"]
trust_level = "trusted"
