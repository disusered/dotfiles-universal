linux|darwin:
  installs:
    cmd: command -v codex &>/dev/null || npm install -g @openai/codex
    depends:
      - /tools/antidote
      - /ai/agent-skills
  links:
    config.toml: ~/.codex/config.toml
    AGENTS.md: ~/.codex/AGENTS.md
    rules: ~/.codex/rules/
    mcp-servers/stitch/env.tpl: ~/.codex/mcp-servers/stitch/env.tpl
    mcp-servers/stitch/stitch-mcp-render-secrets: ~/.local/bin/stitch-mcp-render-secrets
    mcp-servers/stitch/stitch-mcp-wrapper: ~/.local/bin/stitch-mcp-wrapper
