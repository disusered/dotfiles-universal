linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
      VENV=/home/carlos/.hermes/hermes-agent/venv
      if ! "$VENV/bin/python" -c "import fastapi" 2>/dev/null; then
        "$VENV/bin/pip" install -q 'hermes-agent[web,pty]'
      fi
      if [ ! -f /home/carlos/.hermes/hermes-agent/hermes_cli/web_dist/index.html ]; then
        cd /home/carlos/.hermes/hermes-agent/web && npm install --silent && npm run build
      fi
      systemctl --user daemon-reload
      systemctl --user enable --now hermes-dashboard.service hermes-webui.service
    depends:
      - /ai/agent-skills
      - /tools/ffmpeg
      - /tools/ripgrep
      - /tools/tabulate
      - /tools/searxng
      - /ai/openviking
  links:
    config.yaml: ~/.hermes/config.yaml
    env.tpl: ~/.hermes/env.tpl
    scripts/hermes-init: ~/.local/bin/hermes-init
    catppuccin.yaml:
      - ~/.hermes/skins/catppuccin.yaml
      - ~/.hermes/profiles/herding-cats/skins/catppuccin.yaml
    dashboard-catppuccin.yaml:
      - ~/.hermes/dashboard-themes/catppuccin.yaml
      - ~/.hermes/profiles/herding-cats/dashboard-themes/catppuccin.yaml
    hermes-dashboard.service: ~/.config/systemd/user/hermes-dashboard.service
    hermes-gateway.service: ~/.config/systemd/user/hermes-gateway.service
    hermes-gateway-xbol.service: ~/.config/systemd/user/hermes-gateway-xbol.service
    hermes-webui.service: ~/.config/systemd/user/hermes-webui.service
    profiles/xbol/config.yaml: ~/.hermes/profiles/xbol/config.yaml
    profiles/xbol/env.tpl: ~/.hermes/profiles/xbol/env.tpl
    profiles/xbol/SOUL.md: ~/.hermes/profiles/xbol/SOUL.md
    skills/query/SKILL.md: ~/.hermes/skills/database/query/SKILL.md
