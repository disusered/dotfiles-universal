linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      npm i -g opencode-ai
      npx -y opencode-openai-codex-auth@latest
    depends:
      - /ai/agent-skills
      - /tools/tailscale
  links:
    opencode.json: ~/.config/opencode/opencode.json
    opencode.zsh: ~/.config/zsh/5100_opencode.zsh
    catppuccin.json: ~/.config/opencode/themes/catppuccin.json
