global:
  installs:
    cmd: curl -fsSL https://claude.ai/install.sh | bash
    depends:
      - /lib/hyprspace
  links:
    hyprclaude.sh: ~/.local/bin/hyprclaude
    skills: ~/.claude/skills/
    hooks: ~/.claude/hooks
    commands: ~/.claude/commands
    agents: ~/.claude/agents/
    reference: ~/.claude/reference/
    rules: ~/.claude/rules/
    CLAUDE.md: ~/.claude/CLAUDE.md
linux|darwin:
  links:
    settings.json: ~/.claude/settings.json
    file-suggestion.sh: ~/.claude/file-suggestion.sh
    claude.conf: {{ dirs.base.config }}/hypr/conf.d/claude.conf
windows:
  links:
    settings_win.json: ~/.claude/settings.json
