linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      uv tool install --upgrade openviking
      mkdir -p ~/.openviking ~/.local/share/openviking
      systemctl --user daemon-reload
      if [ -f ~/.openviking/ov.conf ]; then
        systemctl --user enable --now openviking.service
      else
        echo "OpenViking linked. Run openviking-render-config, then enable openviking.service."
      fi

      # Clone upstream OpenViking repo (shared by opencode + codex)
      if [ -d ~/.openviking/openviking-repo/.git ]; then
        git -C ~/.openviking/openviking-repo pull --ff-only
      else
        git clone https://github.com/volcengine/OpenViking.git ~/.openviking/openviking-repo
      fi
      OV_REPO=~/.openviking/openviking-repo

      # OpenCode plugin
      mkdir -p ~/.config/opencode/plugins/openviking
      cp $OV_REPO/examples/opencode-plugin/wrappers/openviking.mjs ~/.config/opencode/plugins/openviking.mjs
      cp $OV_REPO/examples/opencode-plugin/index.mjs $OV_REPO/examples/opencode-plugin/package.json ~/.config/opencode/plugins/openviking/
      cp -r $OV_REPO/examples/opencode-plugin/lib ~/.config/opencode/plugins/openviking/
      npm --prefix ~/.config/opencode/plugins/openviking install

      # Codex plugin (upstream canonical — no fork)
      if command -v codex >/dev/null 2>&1; then
        bash $OV_REPO/examples/codex-memory-plugin/setup-helper/install.sh
      else
        echo "Codex not found. Run after Codex is installed: bash ~/.openviking/openviking-repo/examples/codex-memory-plugin/setup-helper/install.sh"
      fi
    depends:
      - /ai/codex
      - /languages/python/uv
      - /tools/gh
  links:
    env.tpl: ~/.openviking/env.tpl
    ov.conf.tpl: ~/.openviking/ov.conf.tpl
    ovcli.conf: ~/.openviking/ovcli.conf
    ovcli-xbol.conf: ~/.openviking/ovcli-xbol.conf
    openviking.zsh: ~/.config/zsh/5002_openviking.zsh
    systemd/openviking.service: ~/.config/systemd/user/openviking.service
    scripts/openviking-render-config: ~/.local/bin/openviking-render-config
    scripts/openviking-server-wrapper: ~/.local/bin/openviking-server-wrapper
    openviking-config.json: ~/.config/opencode/plugins/openviking-config.json
    openviking-codex.zsh: ~/.config/zsh/5003_openviking_codex.zsh
    openviking-claude.zsh: ~/.config/zsh/5004_openviking_claude.zsh
