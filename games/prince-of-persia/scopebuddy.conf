# Prince of Persia: The Sands of Time (AppID 13600).
#
# Intentionally minimal — the globals in ~/.config/scopebuddy/scb.conf cover
# everything PoP needs:
#   - SCB_AUTO_RES=1 handles output resolution (monitor native via wlr-randr)
#   - Internal render is pinned to 3440x1440 by pop.ini
#   - DXWrapper's LimitPerFrameFPS=60 caps the framerate, so no gamescope -r
#
# File exists as an anchor for future per-game tweaks (e.g. --mangoapp,
# per-title env vars) without touching the global conf.
