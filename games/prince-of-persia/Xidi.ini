; Xidi configuration for Prince of Persia: The Sands of Time
; https://github.com/samuelgr/Xidi/blob/main/USERS.md

[Log]
; SUPERDEBUG dumps enumeration and every XInput call.
; Log lands on the Desktop inside the Proton prefix:
; pfx/drive_c/users/steamuser/Desktop/Xidi_POP_Steam.EXE_<pid>.log
Enabled                    = yes
; Level 5 = SuperDebug. Required to log per-call GetDeviceState / Poll;
; wiki documents max=4 but Source/Globals.cpp accepts 5.
Level                      = 5

[Mapper]
; XInputNative = expose the controller with native Xbox axis/button layout.
Type                       = XInputNative

[Workarounds]
; POP 2003 appears to call IDirectInputDevice8::Poll() and check for DI_OK (0);
; Xidi's default return of DI_NOEFFECT makes POP treat the device as not ready.
PollReturnCode             = 0
; Only expose one virtual controller. POP 2003's InputManagerPC only binds
; DInput devices reporting the Xbox 360 gamepad subtype, so the DS4 must
; flow through Steam Input's Valve virtual XInput pad -> Xidi XInput backend
; -> Xidi virtual controller 1.
ActiveVirtualControllerMask = 0x01
