linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      set -e
      "$HOME/.dotfiles/games/lib/steam-set-launch-options.sh" \
        219150 \
        '~/.local/bin/hotline-autoscale %command%' \
        'Hotline Miami'
      echo "Also disable Steam Overlay for this game to prevent the lag bomb."
    depends:
      - /arch/steam
  links:
    hotline-autoscale.sh: ~/.local/bin/hotline-autoscale
    hotline-miami.conf: ~/.config/hypr/conf.d/hotline-miami.conf
    hotline.cfg: ~/.local/share/Steam/steamapps/compatdata/219150/pfx/drive_c/users/steamuser/Documents/My Games/HotlineMiami/hotline.cfg
    alsoftrc: ~/.alsoftrc
