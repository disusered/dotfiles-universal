# vi: ft=hyprlang

# Planescape: Torment EE — gamescope performance rules
# The global gamescope_global rule in steam.conf handles float/center/no_bar.
# This adds fullscreen and latency optimizations.
windowrule {
  name = planescape_torment_ee
  match:class = gamescope
  fullscreen = true
  immediate = true
  animation = none
}
