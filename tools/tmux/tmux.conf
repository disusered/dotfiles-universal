# --- Terminal / Display ---
# xterm-kitty for proper kitty passthrough; RGB override for true color
set -g default-terminal "xterm-kitty"
set -sa terminal-overrides ",xterm-kitty:RGB"
set -g allow-passthrough on          # kitty graphics protocol, etc.
set -s set-clipboard on              # OSC 52 clipboard (wayland-friendly)

# --- General ---
set -g mouse on
set -g base-index 1                  # windows start at 1
setw -g pane-base-index 1            # panes start at 1
set -g renumber-windows on           # re-index on close
set -g escape-time 0                 # no delay after escape
set -g history-limit 50000
set -g focus-events on               # pass focus events to apps
setw -g mode-keys vi                 # vi keys in copy mode

# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Catppuccin ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# --- Bootstrap (auto-clone if missing, then reload) ---
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"
if "test ! -d ~/.config/tmux/plugins/catppuccin/tmux" \
   "run 'mkdir -p ~/.config/tmux/plugins/catppuccin && git clone -b v2.1.3 https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux'"

# Load catppuccin (after bootstrap ensures it exists)
if "test -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux" \
   "run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux"

# --- Status line ---
set -g status-position bottom
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
# TODO: Use active theme accent
set -g @catppuccin_window_current_number_color "#{@thm_peach}"

# --- TPM ---
run '~/.config/tmux/plugins/tpm/tpm'
