# ScopeBuddy globals — inherited by every per-AppID conf.
# Per-game confs live at ~/.config/scopebuddy/AppID/<AppID>.conf and override
# these values.
#
# Env vars replicate the stability knobs that every old games/*-launch.sh
# wrapper was setting by hand:
#   ENABLE_GAMESCOPE_WSI=0  — required for Steam Input / Steam Overlay
#                             unless doing HDR (see #1180). ScopeBuddy's
#                             own SCB_NESTEDFIX=1 layers the nested-Wayland
#                             workaround on top.
#   LD_PRELOAD=""           — drops the Steam overlay libs that injected
#                             themselves via gameoverlayrenderer.so; they
#                             cause the "lag bomb" at launch on some titles.
export ENABLE_GAMESCOPE_WSI=0
export LD_PRELOAD=""

# Auto-detect the focused monitor's resolution (requires wlr-randr on
# wlroots compositors like Hyprland) and rewrite -W/-H accordingly.
SCB_AUTO_RES=1

# Baseline gamescope flags. `-e` / `--steam` are intentionally omitted;
# ScopeBuddy strips them (SCB_STEAMARGIGNORE=1) because they crash gamescope.
SCB_GAMESCOPE_ARGS="-f --grab --backend wayland"
