# ScopeBuddy globals — inherited by every per-AppID conf.
# Per-game confs live at ~/.config/scopebuddy/AppID/<AppID>.conf and override
# these values.
#
# ENABLE_GAMESCOPE_WSI=0 — Gamescope's Vulkan WSI layer bypasses the Steam
# overlay and Steam Input; turning it off is required to get controller
# input into the game under nested gamescope (see gamescope issue #1180).
# HDR titles are an exception — leave it on when we eventually wire one up.
export ENABLE_GAMESCOPE_WSI=0

# Do NOT clear LD_PRELOAD here. Steam's overlay (gameoverlayrenderer.so)
# is exactly how Steam Input gets its hooks into the game process, so
# dropping it globally kills controller support. The old raw wrappers and
# our earlier scb.conf did this blindly to avoid the "lag bomb" where
# Steam's libs were LD_PRELOAD'd into gamescope itself — ScopeBuddy's
# SCB_NESTEDFIX=1 (default) already solves that by unsetting LD_PRELOAD
# only for the gamescope exec while preserving it for the game.

# Auto-detect the focused monitor's resolution (requires wlr-randr on
# wlroots compositors like Hyprland) and rewrite -W/-H accordingly.
SCB_AUTO_RES=1

# ScopeBuddy's wlroots backend for SCB_AUTO_* refuses to pick a primary
# display on its own and hard-errors with "Primary display not supported!"
# unless `--prefer-output <connector>` is present in SCB_GAMESCOPE_ARGS.
# Resolve the currently-focused Hyprland output at load time; fall back
# to the first enabled wlr-randr output if hyprctl isn't available.
SCB_PREFER_OUTPUT=$(hyprctl -j monitors 2>/dev/null \
    | jq -r 'first(.[] | select(.focused == true) | .name)' 2>/dev/null)
if [ -z "$SCB_PREFER_OUTPUT" ] || [ "$SCB_PREFER_OUTPUT" = "null" ]; then
    SCB_PREFER_OUTPUT=$(wlr-randr --json 2>/dev/null \
        | jq -r 'first(.[] | select(.enabled == true) | .name)' 2>/dev/null)
fi

# Baseline gamescope flags.
#
# We tried `-e` / `--steam` per gamescope issue #1180 (3v1n0, 2026-01-21),
# but on Arch's gamescope 3.16.23 build it makes the nested surface fail to
# map as a Hyprland client — game runs headless (audio only, no window).
# 3v1n0's report was specifically for Steam-itself-in-gamescope, not per-
# game launch; the context differs. Leave `-e` off and handle Steam Input
# out-of-band (per-game Steam controller layout, Xidi for Proton, etc.).
SCB_GAMESCOPE_ARGS="-f --grab --backend wayland${SCB_PREFER_OUTPUT:+ --prefer-output $SCB_PREFER_OUTPUT}"
