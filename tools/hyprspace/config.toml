[scratchpads]
names = ["btop", "fastfetch"]

[workspaces.ai]
window_class = "claude_modal"
title_prefix = "claude: "
context_type = "cwd"
multi_instance = true
dismiss_scratchpads = false
extra_classes = ["chrome-gemini.google.com__-Default"]
spawn_command = ["kitty", "--class", "claude_modal", "--title", "{title}", "--directory", "{context}", "--hold", "zsh", "-ic", "claude"]

[workspaces.clipboard]
window_class = "clipse_scratch"
window_title = "clipse"
context_type = "none"
multi_instance = false
dismiss_scratchpads = false
spawn_command = ["kitty", "--class", "clipse_scratch", "--title", "clipse", "clipse"]

[workspaces.lazygit]
window_class = "lazygit_modal"
title_prefix = "lazygit: "
context_type = "git_root"
multi_instance = false
dismiss_scratchpads = false
spawn_command = ["kitty", "--class", "lazygit_modal", "--title", "{title}", "--directory", "{context}", "lazygit"]

[workspaces.calculator]
window_class = "qalculate-gtk"
context_type = "none"
multi_instance = false
dismiss_scratchpads = false
spawn_via_desktop = true
spawn_command = ["app2unit", "qalculate-gtk.desktop"]
