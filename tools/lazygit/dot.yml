windows:
  installs:
    cmd: scoop install lazygit
    depends:
      - /packages/scoop
      - /tools/delta
      - /tools/bat
      - /tools/git
  links:
    config_windows.yaml: >-
      {{ env.LOCALAPPDATA }}/lazygit/config.yml
linux[whoami.distro^="Fedora"]:
  installs:
    cmd: brew install lazygit
    depends:
      - /packages/homebrew
      - /tools/delta
      - /tools/git
  links:
    config.yaml: ~/.config/lazygit/config.yml
    lazygit-image-diff: ~/.local/bin/lazygit-image-diff
linux[whoami.distro^="Arch"]:
  installs:
    cmd: sudo pacman -S --noconfirm --needed lazygit
    depends:
      - /tools/delta
      - /tools/git
      - /tools/kitty
      - /tools/hyprspace
  links:
    config.yaml: ~/.config/lazygit/config.yml
    lazygit-image-diff: ~/.local/bin/lazygit-image-diff
    lazygit.conf: {{ dirs.base.config }}/hypr/conf.d/lazygit.conf
