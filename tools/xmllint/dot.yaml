windows:
  installs:
    cmd: scoop install main/libxml2
    depends:
      - /packages/scoop
linux[whoami.distro^="Arch"]:
  installs:
    cmd: sudo pacman -S --noconfirm --needed libxml2
linux[whoami.distro^="Fedora"]:
  installs:
    cmd: brew install libxml2
    depends:
      - /packages/homebrew
