linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi swayosd &>/dev/null; then
        sudo pacman -S --noconfirm --needed swayosd
        sudo systemctl enable --now swayosd-libinput-backend.service
      fi
    depends:
      - /lib/pipewire
  links:
    style.css: ~/.config/swayosd/style.css
    sway.conf: ~/.config/hypr/conf.d/sway.conf
    swayosd-server.service: ~/.config/systemd/user/swayosd-server.service
