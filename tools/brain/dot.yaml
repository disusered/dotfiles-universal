linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      brain_src=/home/carlos/Development/ME/herding-cats/utilities/brain
      if [ ! -d "$brain_src" ]; then
        printf '%s\n' "brain source is missing: $brain_src" >&2
        exit 1
      fi
      cargo install --path "$brain_src" --force
    depends:
      - /languages/rust
