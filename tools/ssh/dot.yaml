windows:
  links:
    allowed_signers: ~/.ssh/allowed_signers
linux[whoami.distro^="Fedora"]:
  links:
    sshexe.zsh: ~/.config/zsh/0016_sshexe.zsh
linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi openssh &>/dev/null; then
        sudo pacman -S --noconfirm --needed openssh
        sudo systemctl enable --now sshd
      fi
