linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi caddy &>/dev/null; then
        sudo pacman -S --noconfirm --needed caddy
      fi
      TS_IP=$(tailscale ip -4)
      sudo mkdir -p /etc/caddy
      sudo mkdir -p /etc/systemd/system/caddy.service.d
      sudo cp ~/.dotfiles/tools/caddy/Caddyfile /etc/caddy/Caddyfile
      sudo chown root:root /etc/caddy/Caddyfile
      sudo install -m 644 /dev/null /etc/systemd/system/caddy.service.d/override.conf
      echo "[Service]" | sudo tee /etc/systemd/system/caddy.service.d/override.conf > /dev/null
      echo "Environment=CADDY_TAILSCALE_IP=${TS_IP}" | sudo tee -a /etc/systemd/system/caddy.service.d/override.conf > /dev/null
      sudo systemctl daemon-reload
      sudo systemctl restart caddy.service
