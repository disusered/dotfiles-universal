linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! pacman -Qi caddy &>/dev/null; then
        sudo pacman -S --noconfirm --needed caddy
      fi
      sudo mkdir -p /etc/caddy
      sudo cp ~/.dotfiles/tools/caddy/Caddyfile /etc/caddy/Caddyfile
      sudo chown root:root /etc/caddy/Caddyfile
      sudo cp ~/.dotfiles/tools/caddy/caddy.service /etc/systemd/system/caddy.service
      sudo chown root:root /etc/systemd/system/caddy.service
      sudo rm -f /etc/systemd/system/caddy.service.d/tailscale.conf
      sudo systemctl daemon-reload
      sudo systemctl enable caddy.service
      sudo systemctl restart caddy.service
