[Unit]
Wants=tailscaled.service
After=tailscaled.service network-online.target

[Service]
EnvironmentFile=/etc/caddy/tailscale.env
ExecStartPre=/bin/sh -c 'i=0; while [ "$i" -lt 30 ]; do /usr/bin/ip -4 addr show dev tailscale0 | /usr/bin/grep -Fq -- "$CADDY_TAILSCALE_IP" && exit 0; i=$((i + 1)); /usr/bin/sleep 1; done; exit 1'
Restart=on-failure
RestartSec=5s
