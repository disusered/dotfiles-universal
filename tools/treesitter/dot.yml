windows:
  installs:
    cmd: scoop install tree-sitter
    depends:
      - /packages/scoop
linux[whoami.distro^="Fedora"]:
  installs:
    cmd: brew install tree-sitter-cli
    depends:
      - /packages/homebrew
linux[whoami.distro^="Arch"]:
  installs:
    cmd: sudo pacman -S --noconfirm --needed tree-sitter tree-sitter-cli
  links:
    config.json: ~/.config/tree-sitter/config.json
