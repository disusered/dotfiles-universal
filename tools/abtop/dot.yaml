linux[whoami.distro^="Arch"]:
  installs:
    cmd: command -v abtop &>/dev/null || cargo install abtop
    depends:
      - /languages/rust
  links:
    config.toml: {{ dirs.base.config }}/abtop/config.toml
    abtop.conf: {{ dirs.base.config }}/hypr/conf.d/abtop.conf
    abtop.toml: {{ dirs.base.config }}/pypr/conf.d/abtop.toml
