# vi: ft=hyprlang

# Floating, centered, persistent password prompt
windowrule {
  name = "1Password"
  match:class = 1Password
  float = true
  center = true
  pin = true
  stay_focused = true
  animation = slide top
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, P, exec, app2unit 1password.desktop
