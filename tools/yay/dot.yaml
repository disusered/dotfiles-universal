linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      if ! command -v yay &>/dev/null; then
        if [ -d ~/.yay ]; then
          cd ~/.yay && git pull
        else
          git clone --depth 1 https://aur.archlinux.org/yay.git ~/.yay
        fi
        cd ~/.yay && makepkg -si --noconfirm
      fi
    depends:
      - /lib/arch
      - /tools/git
  links:
    yay.zsh: ~/.config/zsh/1400_yay.zsh
