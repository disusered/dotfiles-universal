linux[whoami.distro^="Arch"]:
  installs:
    cmd: |
      podman pull docker.io/searxng/searxng:latest
      mkdir -p ~/.config/searxng
      mkdir -p ~/.config/containers/systemd
      rm -f ~/.config/systemd/user/searxng.service ~/.config/systemd/user/default.target.wants/searxng.service
      systemctl --user daemon-reload
      systemctl --user restart searxng.service
    depends:
      - /packages/podman
  links:
    settings.yml: ~/.config/searxng/settings.yml
    searxng.container: ~/.config/containers/systemd/searxng.container
