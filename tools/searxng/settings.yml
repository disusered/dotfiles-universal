use_default_settings: true

general:
  instance_name: "local searxng"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "hermes-local-instance"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: brave
    engine: brave
    shortcut: br
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
